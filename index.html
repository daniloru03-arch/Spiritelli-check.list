<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Asteria✨</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icona.png">
  <meta name="apple-mobile-web-app-title" content="Asteria">
  <style>
    :root{
      --notte:#0B1A33; --glow:#143263; --pannello:#10264C; --bordo:#27477E;
      --ceruleo:#5BC9F5; --oro:#FFCF5C; --anguria:#FF6E87;
      --ink:#EAF2FF; --muted:#8FA8CC;
      --display:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN","Arial Rounded MT Bold",system-ui,sans-serif;
      --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;color:var(--ink);font-family:var(--display);min-height:100vh;
      background:radial-gradient(1100px 520px at 50% -180px,var(--glow),var(--notte) 60%) fixed,var(--notte);}
    .wrap{max-width:720px;margin:0 auto;padding:0 12px 60px}
    header{position:sticky;top:0;z-index:10;background:rgba(11,26,51,.88);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid var(--bordo);padding:10px 12px 8px;margin:0 -12px 14px;}
    .toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}
    h1{margin:0;font-size:21px;letter-spacing:.5px}
    h1 .spark{color:var(--ceruleo)}
    .sub{font-size:11px;color:var(--muted);margin-top:1px}
    .counter{font-family:var(--mono);font-variant-numeric:tabular-nums;background:var(--pannello);
      border:1px solid var(--bordo);border-radius:999px;padding:6px 12px;font-size:15px;font-weight:700;white-space:nowrap;
      transition:box-shadow .3s,border-color .3s}
    .counter small{color:var(--muted);font-weight:400}
    .counter .pct{color:var(--ceruleo);font-size:11px;margin-left:6px}
    body.done .counter{border-color:var(--oro);box-shadow:0 0 14px #ffcf5c55;color:var(--oro)}
    .track{height:8px;border-radius:99px;background:#0a1730;border:1px solid #1d3a68;margin-top:9px;overflow:hidden}
    .fill{height:100%;width:0%;border-radius:99px;transition:width .45s cubic-bezier(.3,1,.4,1);
      background:linear-gradient(90deg,#9DB4D6,#F5C445 22%,#FF6E87 42%,#8E5BD6 62%,#6EE7F0 82%,#EAF7FF)}
    .chips{display:flex;gap:6px;align-items:center;margin-top:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
    .chips::-webkit-scrollbar{display:none}
    .chip{flex:0 0 auto;font-family:var(--display);font-size:12.5px;font-weight:700;color:var(--muted);
      background:transparent;border:1px solid var(--bordo);border-radius:999px;padding:5px 12px;cursor:pointer}
    .chip.on{color:#062038;background:var(--ceruleo);border-color:var(--ceruleo)}
    .sep{flex:0 0 auto;width:1px;height:18px;background:var(--bordo);margin:0 2px}
    section{margin-bottom:20px}
    .famhead{display:flex;align-items:center;gap:7px;margin:0 2px 2px;flex-wrap:wrap}
    .famname{font-size:16.5px;font-weight:800;letter-spacing:.3px}
    .rar{font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
      border-radius:999px;padding:2px 8px;color:#071528}
    .rar.rara{background:#3aa9ff}.rar.epica{background:#b15fff}
    .rar.leggendaria{background:#ff9a3d}.rar.mitica{background:#ffd24a}
    .famcount{margin-left:auto;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:11.5px;
      color:var(--muted);background:var(--pannello);border:1px solid var(--bordo);border-radius:999px;padding:2px 8px}
    .famcount.full{color:#062038;background:var(--oro);border-color:var(--oro);font-weight:700}
    .bulk{flex:0 0 auto;font-size:11px;font-weight:700;color:var(--ceruleo);background:transparent;
      border:1px solid var(--bordo);border-radius:999px;padding:3px 9px;cursor:pointer}
    .ab{font-size:11px;color:var(--muted);margin:0 2px 8px;line-height:1.35}
    .grid{display:grid;gap:8px}
    body[data-size="big"] .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    body[data-size="small"] .grid{grid-template-columns:repeat(6,minmax(0,1fr));gap:6px}
    .sp{position:relative;padding:0;border:1.5px solid var(--bordo);border-radius:13px;overflow:hidden;
      background:var(--pannello);cursor:pointer;display:block;width:100%;
      transition:transform .12s,border-color .2s,box-shadow .2s,opacity .25s}
    .sp img{display:block;width:100%;height:auto;pointer-events:none}
    .ph{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:46px;background:linear-gradient(160deg,#17325f,#0c2143)}
    .sp:not(.on) img{filter:saturate(.82) brightness(.94)}
    .sp:active{transform:scale(.94)}
    .vlab{display:block;font-size:10.5px;font-weight:700;color:var(--muted);text-align:center;padding:4px 2px 6px;pointer-events:none}
    .sp.on .vlab{color:var(--oro)}
    body[data-size="small"] .vlab{display:none}
    .sp .bd{position:absolute;top:5px;right:5px;width:21px;height:21px;border-radius:50%;
      background:var(--oro);color:#3d2c00;font-size:13px;font-weight:900;display:none;
      align-items:center;justify-content:center;box-shadow:0 1px 4px #0008}
    .sp.on{border-color:var(--oro);box-shadow:0 0 0 1.5px #ffcf5c55,0 3px 10px #00000055}
    .sp.on .bd{display:flex;animation:pop .25s cubic-bezier(.2,1.6,.4,1)}
    @keyframes pop{from{transform:scale(.3)}to{transform:scale(1)}}
    body[data-filter="todo"] .sp.on{opacity:.13;pointer-events:none}
    body[data-filter="done"] .sp:not(.on){opacity:.13;pointer-events:none}
    .sp:focus-visible,.chip:focus-visible,.bulk:focus-visible,.reset:focus-visible{outline:2px solid var(--ceruleo);outline-offset:2px}
    footer{margin-top:34px;text-align:center}
    .reset{font-family:var(--display);font-size:13px;font-weight:700;color:var(--anguria);
      background:transparent;border:1.5px solid #ff6e8755;border-radius:999px;padding:8px 18px;cursor:pointer}
    .reset.arm{color:#062038;background:var(--anguria);border-color:var(--anguria)}
    .note{font-size:11px;color:var(--muted);margin-top:12px}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>

<script>
  let data = JSON.parse(document.getElementById('data').textContent);
  let checked = JSON.parse(localStorage.getItem('spiritelli_progress') || '{}');
  const main = document.getElementById('main');
  const nLabel = document.getElementById('n');
  const pctLabel = document.getElementById('pct');
  const fill = document.querySelector('.fill');
  const body = document.body;

  // Profilo Utente (Simulato)
  const users = [
    { name: "Ash", avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150&auto=format&fit=crop&q=60" },
    { name: "Misty", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150&auto=format&fit=crop&q=60" },
    { name: "Brock", balances: "https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=150&auto=format&fit=crop&q=60" }
  ];
  const randomUser = users[Math.floor(Math.random() * users.length)];
  document.getElementById('userName').textContent = randomUser.name;
  document.getElementById('userAvatar').src = randomUser.avatar;

  // Calcolo totale sprite
  let totalSprites = 0;
  data.families.forEach(f => totalSprites += f.sprites.length);
  document.querySelector('.counter small').textContent = `/${totalSprites}`;

  function updateProgress() {
    let count = Object.values(checked).filter(Boolean).length;
    nLabel.textContent = count;
    let pct = totalSprites > 0 ? Math.round((count / totalSprites) * 100) : 0;
    pctLabel.textContent = `${pct}%`;
    fill.style.width = `${pct}%`;
    
    if(count === totalSprites && totalSprites > 0) {
      body.classList.add('done');
    } else {
      body.classList.remove('done');
    }

    // Aggiorna contatori di famiglia
    data.families.forEach(f => {
      let famCount = f.sprites.filter(s => checked[s.id]).length;
      let el = document.getElementById(`c-${f.id}`);
      if(el) {
        el.textContent = `${famCount}/${f.sprites.length}`;
        if(famCount === f.sprites.length) {
          el.classList.add('full');
        } else {
          el.classList.remove('full');
        }
      }
    });
  }

  function render() {
    main.innerHTML = '';
    data.families.forEach(f => {
      let sec = document.createElement('section');
      
      let head = document.createElement('div');
      head.className = 'famhead';
      
      let name = document.createElement('span');
      name.className = 'famname';
      name.textContent = f.name;
      
      let rar = document.createElement('span');
      rar.className = `rar ${f.rar}`;
      rar.textContent = f.rar;
      
      let count = document.createElement('span');
      count.className = 'famcount';
      count.id = `c-${f.id}`;
      
      let bulkBtn = document.createElement('button');
      bulkBtn.className = 'bulk';
      bulkBtn.textContent = 'Tutti';
      bulkBtn.onclick = () => {
        let allChecked = f.sprites.every(s => checked[s.id]);
        f.sprites.forEach(s => {
          checked[s.id] = !allChecked;
          let btn = document.getElementById(`b-${s.id}`);
          if(btn) {
            if(!allChecked) btn.classList.add('on');
            else btn.classList.remove('on');
          }
        });
        localStorage.setItem('spiritelli_progress', JSON.stringify(checked));
        updateProgress();
      };

      head.appendChild(name);
      head.appendChild(rar);
      head.appendChild(bulkBtn);
      head.appendChild(count);
      sec.appendChild(head);

      if(f.ab) {
        let ab = document.createElement('div');
        ab.className = 'ab';
        ab.textContent = `Effetto: ${f.ab}`;
        sec.appendChild(ab);
      }

      let grid = document.createElement('div');
      grid.className = 'grid';

      f.sprites.forEach(s => {
        let btn = document.createElement('button');
        btn.className = 'sp';
        btn.id = `b-${s.id}`;
        if(checked[s.id]) btn.classList.add('on');
        
        btn.onclick = () => {
          checked[s.id] = !checked[s.id];
          btn.classList.toggle('on');
          localStorage.setItem('spiritelli_progress', JSON.stringify(checked));
          updateProgress();
        };

        if(s.img) {
          let img = document.createElement('img');
          img.src = s.img;
          img.alt = s.v;
          img.loading = 'lazy';
          btn.appendChild(img);
        } else {
          let ph = document.createElement('div');
          ph.className = 'ph';
          ph.textContent = '✨';
          btn.appendChild(ph);
        }

        let badge = document.createElement('div');
        badge.className = 'bd';
        badge.textContent = '✓';
        btn.appendChild(badge);

        let vlab = document.createElement('span');
        vlab.className = 'vlab';
        vlab.textContent = s.v;
        btn.appendChild(vlab);

        grid.appendChild(btn);
      });

      sec.appendChild(grid);
      main.appendChild(sec);
    });
    updateProgress();
  }

  // Gestione Filtri e Dimensioni
  document.querySelectorAll('.chip[data-f]').forEach(ch => {
    ch.onclick = () => {
      document.querySelectorAll('.chip[data-f]').forEach(c => c.classList.remove('on'));
      ch.classList.add('on');
      body.setAttribute('data-filter', ch.getAttribute('data-f'));
    };
  });

  document.querySelectorAll('.chip[data-s]').forEach(ch => {
    ch.onclick = () => {
      document.querySelectorAll('.chip[data-s]').forEach(c => c.classList.remove('on'));
      ch.classList.add('on');
      body.setAttribute('data-size', ch.getAttribute('data-s'));
    };
  });

  // Reset Progressi
  const resetBtn = document.getElementById('reset');
  let resetArmed = false;
  resetBtn.onclick = () => {
    if(!resetArmed) {
      resetArmed = true;
      resetBtn.textContent = 'Sicuro? Clicca di nuovo';
      resetBtn.classList.add('arm');
      setTimeout(() => {
        resetArmed = false;
        resetBtn.textContent = 'Azzera progressi';
        resetBtn.classList.remove('arm');
      }, 3000);
    } else {
      checked = {};
      localStorage.removeItem('spiritelli_progress');
      resetArmed = false;
      resetBtn.textContent = 'Azzera progressi';
      resetBtn.classList.remove('arm');
      render();
    }
  };

  // Setup barra dei filtri sotto l'header
  const filterRow = document.createElement('div');
  filterRow.className = 'chips';
  filterRow.innerHTML = `
    <button class="chip on" data-f="all">Tutti</button>
    <button class="chip" data-f="todo">Mancanti</button>
    <button class="chip" data-f="done">Presi</button>
    <div class="sep"></div>
    <button class="chip on" data-s="big">Griglia Grande</button>
    <button class="chip" data-s="small">Griglia Compatta</button>
  `;
  document.querySelector('header').appendChild(filterRow);
  
  // Aggiunta barra di progresso visiva sotto i filtri
  const track = document.createElement('div');
  track.className = 'track';
  track.innerHTML = '<div class="fill"></div>';
  document.querySelector('header').appendChild(track);

  // Inizializzazione
  render();
</script>
</body>
